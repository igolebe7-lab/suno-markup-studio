services:
  - type: web
    name: suno-markup-api
    runtime: node
    plan: free
    branch: main
    rootDir: .
    buildCommand: npm ci && npm run render:build && npm run prisma:deploy
    startCommand: npm run start:api
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: WEB_ORIGINS
        sync: false
      - key: WRITE_ORIGIN_PROTECTION
        value: "true"
      - key: API_BODY_LIMIT_BYTES
        value: "1500000"
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: none
      - key: ACCESS_TOKEN_TTL_MS
        value: "900000"
      - key: REFRESH_TOKEN_TTL_MS
        value: "2592000000"
      - key: AUTH_RATE_LIMIT_MAX
        value: "8"
      - key: AUTH_RATE_LIMIT_WINDOW_MS
        value: "900000"
